<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAMPASS | Admin Dashboard</title>
    <link rel="stylesheet" href="admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <h1 class="logo">EXAM<span>PASS</span></h1>
        </div>
        <div class="nav-right">
            <div class="notif-container">
                <div class="notif-bell" id="notifBell">
                    <i class="fa-regular fa-bell"></i>
                    <span class="notif-badge">6</span>
                </div>
                <div class="dropdown-menu notif-dropdown" id="notifDropdown">
                    <div class="notif-header">
                        Notifications
                        <div style="font-weight: normal; font-size: 12px;">0 new notifications</div>
                    </div>
                    <div class="notif-body">
                        <i class="fa-regular fa-bell-slash"></i>
                        No new notifications
                    </div>
                </div>
            </div>

            <div class="user-profile-wrapper">
               <div class="user-profile" id="userProfileTrigger">
    <div class="user-info">
        <span class="user-name">System Administrator</span>
        <span class="user-role-label">Admin</span>
    </div>
    <div class="user-avatar-group">
        <div class="user-avatar">SA</div>
        <i class="fa-solid fa-chevron-down"></i>
    </div>
</div>
                <div class="dropdown-menu user-dropdown" id="userDropdown">
                    <div class="dropdown-item"><i class="fa-solid fa-gear"></i> Settings</div>
                    <div class="dropdown-item" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</div>
                </div>
            </div>
        </div>
    </nav>

    <main class="content-area">
        <div class="management-header">
            <h2>User Management</h2>
            <button class="add-user-btn" onclick="openAddUser()"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div class="table-card">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Profile</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </main>

    <div id="addModal" class="modal hidden">
    <div class="modal-content edit-card">
        <h3>Add New User</h3>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="newName" placeholder="Enter full name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="newEmail" placeholder="user@365.edu.ph">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="newRole">
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
                <option value="Program Head">Program Head</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveNewUser()">Add User</button>
        </div>
    </div>
</div>

    <div id="editModal" class="modal hidden">
        <div class="modal-content edit-card">
            <h3>Edit User Access</h3>
            <div class="form-group">
                <label>Role</label>
                <select id="editRole">
                    <option value="Teacher">Teacher</option>
                    <option value="Program Head">Program Head</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="editStatus">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('editModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveUserEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal hidden">
        <div class="modal-content delete-card">
            <div class="warning-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
            <h3>Are you sure?</h3>
            <p>You are about to remove this user. This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('deleteModal')">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Confirm</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal hidden">
        <div class="modal-content">
            <h3>User Details</h3>
            <div id="userDetailsContent"></div>
            <button class="btn btn-secondary" onclick="closeModal('detailsModal')">Close</button>
        </div>
    </div>

    <script src="admin-dashboard.js"></script>
</body>
</html>
